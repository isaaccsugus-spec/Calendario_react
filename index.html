    <script>
      tailwind.config = {
        darkMode: 'class',

                light: '#f8f6f8',
                dark: '#22101e',
              },
              surface: {
                DEFAULT: '#ffffff',
                dark: '#2a1b26',
              },
              text: {
                main: '#181116',
                muted: '#896181',
              }
            }
          }
        }
      }
    </script>
    <style>

      ::-webkit-scrollbar {

      }
      ::-webkit-scrollbar-thumb {
        background: #e6dbe4;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #d1c4cf;
      }
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
